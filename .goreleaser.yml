# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2

project_name: dapr-go-workflow-k8s

before:
  hooks:
    - go mod tidy

builds:
  - id: server
    main: ./cmd
    binary: dapr-go-workflow-k8s
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: AndriyKalashnykov
    name: dapr-go-workflow-k8s
