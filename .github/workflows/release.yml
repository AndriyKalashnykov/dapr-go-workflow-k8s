name: Release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Reuse the CI workflow as the validation gate. On a tag this also builds,
  # Trivy-scans, and publishes (+ cosign-signs) the multi-arch container image.
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: write
      id-token: write

  # GoReleaser ships the binaries, archives, checksums, changelog, and the
  # GitHub Release. Serialized after `ci` so a tag produces both the container
  # image (via ci's docker job) and the GitHub Release artifacts, or neither.
  goreleaser:
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0   # goreleaser needs full history for the changelog
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          install: true
          cache: true
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --clean -f ./.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
